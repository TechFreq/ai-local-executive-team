# ══════════════════════════════════════════════════════
# EXAMPLES
# ══════════════════════════════════════════════════════
#
# — Swap CEO to a model you downloaded:
#
#   board:
#     ceo: meta-llama/llama-3.1-70b-instruct
#
# — Use one model for ALL roles (like the gemma12b preset):
#
#   board:
#     ceo: google/gemma-3-12b
#     cto: google/gemma-3-12b
#     cfo: google/gemma-3-12b
#     cpo: google/gemma-3-12b
#     coo: google/gemma-3-12b
#
# — Speed up the whole board by swapping heavy models for smaller ones:
#
#   board:
#     ceo: qwen/qwen3.5-9b
#     cfo: microsoft/phi-4-reasoning-plus
#     cpo: qwen/qwen3.5-9b
#
# — Only change the COO to something faster (leave others alone):
#
#   board:
#     coo: google/gemma-4-e2b
#
# ══════════════════════════════════════════════════════

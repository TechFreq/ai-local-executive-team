# config/my_models.yaml
# ══════════════════════════════════════════════════════
# MY MODEL OVERRIDES
# Change a model in ONE place — affects ALL presets
# ══════════════════════════════════════════════════════
#
# HOW TO USE:
#   1. Find the role you want to change below
#   2. Remove the # at the start of that line
#   3. Replace the model ID with the one you downloaded
#   4. Save this file
#   5. Restart the bridge (or press SPACE → same preset)
#
# Model IDs must match exactly what LM Studio shows.
# Example: google/gemma-4-31b   or   qwen/qwen3-coder-30b
# Tip: In LM Studio → My Models → hover a model to see its ID
#
# This file overrides ALL presets (balanced, fast, smart, etc.)
# Comment out a line to stop overriding that role.
# Delete this file entirely to restore default preset behavior.
#
# ── BOARD OVERRIDES ───────────────────────────────────

board:
  # ceo: google/gemma-4-31b
  # cto: qwen/qwen3-coder-30b
  # cfo: deepseek/deepseek-r1-distill-qwen-32b
  # cpo: google/gemma-4-26b-a4b
  # coo: qwen/qwen2.5-coder-14b-instruct

# ── UTILITY OVERRIDES ─────────────────────────────────

